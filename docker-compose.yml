version: '3.8'

services:
  # 1. PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: raksha_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: raksha_net_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Neo4j Graph Database
  neo4j:
    image: neo4j:5.17.0
    container_name: raksha_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data

  # 3. FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raksha_backend
    restart: always
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_DB=under_tow_db
      - POSTGRES_PORT=5432
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - SECRET_KEY=raksha-net-super-secret-jwt-key-2026-secure-key
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
    volumes:
      - ./backend/uploads:/app/uploads

  # 4. Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: raksha_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
